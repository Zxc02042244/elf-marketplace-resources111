<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elf Continent Marketplace Analytics Dashboard</title>
  <style>
    :root {
      --bg: #0c120e;
      --panel: #172018;
      --panel-2: #202b21;
      --line: #314234;
      --text: #eef4eb;
      --muted: #a9b8a6;
      --accent: #8ecf78;
      --gold: #f0c66d;
      --bad: #f06f64;
      --shadow: 0 14px 38px rgba(0, 0, 0, 0.26);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(142, 207, 120, 0.15), transparent 34%),
        radial-gradient(circle at 86% 6%, rgba(240, 198, 109, 0.1), transparent 28%),
        linear-gradient(180deg, #182018 0%, var(--bg) 44%, #080d0a 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input, select { font: inherit; }

    .app {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 36px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 10px 0 14px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #5fa85f, #2e6b42);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: var(--shadow);
      color: #f7ffe8;
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .language {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .lang-btn,
    .tab-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(8, 12, 8, 0.42);
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      min-height: 34px;
      padding: 0 10px;
    }

    .lang-btn.active,
    .tab-btn.active {
      background: var(--accent);
      color: #102010;
      border-color: transparent;
    }

    .sticky-search {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) 180px auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 26, 19, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .market-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      min-height: 42px;
      background: rgba(8, 12, 8, 0.42);
    }

    .market-tab {
      min-width: 112px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      font-weight: 850;
      cursor: pointer;
      padding: 0 12px;
    }

    .market-tab:last-child { border-right: 0; }
    .market-tab.active { background: var(--accent); color: #102010; }

    .field {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(8, 12, 8, 0.42);
      color: var(--text);
      outline: none;
      padding: 0 12px;
    }

    .field:focus { border-color: var(--accent); }
    select.field { cursor: pointer; }

    .refresh {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      color: #102010;
      background: var(--accent);
      font-weight: 900;
      cursor: pointer;
      padding: 0 16px;
    }

    .refresh:disabled { cursor: progress; opacity: 0.66; }

    .status {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(142, 207, 120, 0.16);
    }

    .dot.loading { background: var(--gold); box-shadow: 0 0 0 4px rgba(240, 198, 109, 0.16); }
    .dot.error { background: var(--bad); box-shadow: 0 0 0 4px rgba(240, 111, 100, 0.16); }

    .section {
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
    }

    .section-title {
      margin: 0;
      font-size: 16px;
      font-weight: 950;
    }

    .section-note {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(24, 32, 25, 0.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      min-width: 0;
    }

    .metric {
      min-height: 86px;
      padding: 14px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-value {
      margin-top: 7px;
      font-size: 24px;
      line-height: 1.05;
      font-weight: 950;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .panel {
      padding: 14px;
      min-width: 0;
    }

    .wide { grid-column: 1 / -1; }

    .compact-list {
      display: grid;
      gap: 8px;
    }

    .compact-row {
      display: grid;
      grid-template-columns: minmax(120px, 1.15fr) repeat(3, minmax(74px, 0.68fr));
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid rgba(52, 66, 53, 0.82);
      background: rgba(8, 12, 8, 0.28);
      min-width: 0;
    }

    .compact-row.six {
      grid-template-columns: minmax(130px, 1.1fr) minmax(110px, 0.9fr) minmax(110px, 0.9fr) 82px 70px 90px;
    }

    .row-main {
      min-width: 0;
      font-size: 13px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .row-sub {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      margin-top: 3px;
    }

    .stat { min-width: 0; }
    .stat span { display: block; color: var(--muted); font-size: 11px; margin-bottom: 3px; }
    .stat strong { display: block; font-size: 13px; overflow-wrap: anywhere; }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 8px;
      background: rgba(240, 198, 109, 0.13);
      color: #ffe1a1;
      border: 1px solid rgba(240, 198, 109, 0.35);
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .search-layout {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .profile {
      display: grid;
      grid-template-columns: minmax(180px, 1.2fr) repeat(4, minmax(120px, 0.7fr));
      gap: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .profile-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .profile-stat strong {
      display: block;
      font-size: 18px;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 10px;
      scrollbar-width: thin;
    }

    .tab-btn {
      flex: 0 0 auto;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .score-wrap {
      display: grid;
      gap: 10px;
    }

    .score-line {
      height: 14px;
      border-radius: 999px;
      background: rgba(8, 12, 8, 0.48);
      border: 1px solid rgba(52, 66, 53, 0.82);
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--bad));
      transition: width 160ms ease;
    }

    .table-shell {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid rgba(52, 66, 53, 0.82);
      background: rgba(8, 12, 8, 0.24);
    }

    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 9px 10px;
      border-bottom: 1px solid rgba(52, 66, 53, 0.74);
      font-size: 13px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    tr:last-child td { border-bottom: 0; }

    .mobile-transactions {
      display: none;
    }

    .tx-card {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(52, 66, 53, 0.82);
      background: rgba(8, 12, 8, 0.28);
    }

    .tx-line {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }

    .item-card {
      padding: 12px;
      min-height: 134px;
    }

    .item-head {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .item-media {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      display: grid;
      place-items: center;
      color: var(--gold);
      font-weight: 950;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .item-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .item-name {
      font-size: 14px;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .item-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .item-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .empty,
    .error-box,
    .notice {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(8, 12, 8, 0.28);
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .error-box {
      color: #ffc4bd;
      border-color: rgba(240, 111, 100, 0.5);
      margin-bottom: 12px;
      text-align: left;
    }

    @media (max-width: 980px) {
      .sticky-search {
        grid-template-columns: 1fr 1fr;
      }

      .metric-grid,
      .dashboard-grid,
      .search-layout,
      .profile {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .wide { grid-column: auto; }
    }

    @media (max-width: 680px) {
      .app {
        width: min(100% - 18px, 1240px);
        padding-top: 10px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .language {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .sticky-search {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 9px;
        margin-left: -1px;
        margin-right: -1px;
      }

      .market-tabs {
        width: 100%;
      }

      .metric-grid,
      .dashboard-grid,
      .search-layout,
      .profile {
        grid-template-columns: 1fr;
      }

      .metric {
        min-height: 74px;
        padding: 12px;
      }

      .metric-value {
        font-size: 26px;
      }

      .panel,
      .profile,
      .item-card {
        padding: 10px;
      }

      .section {
        margin-bottom: 10px;
      }

      .compact-list {
        gap: 6px;
      }

      .compact-row,
      .compact-row.six {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 8px;
      }

      .compact-row .row-main {
        grid-column: 1 / -1;
      }

      .table-shell.desktop-transactions {
        display: none;
      }

      .mobile-transactions {
        display: grid;
        gap: 7px;
      }

      .item-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .item-stats {
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">ELF</div>
        <div>
          <h1 data-i18n="appTitle">Elf Continent Marketplace Analytics Dashboard</h1>
          <div class="subtitle" data-i18n="subtitle">市場交易、玩家收入、關聯帳戶與交易集中度分析</div>
        </div>
      </div>
      <div class="language" aria-label="Language">
        <span data-i18n="language">語言</span>
        <button class="lang-btn active" type="button" data-lang="zh-TW" data-i18n="traditionalChinese">繁體中文</button>
        <button class="lang-btn" type="button" data-lang="en" data-i18n="english">English</button>
      </div>
    </header>

    <section class="sticky-search" aria-label="Search and filters">
      <div class="market-tabs" role="tablist" aria-label="Market category">
        <button class="market-tab active" type="button" data-category="Resources" role="tab" aria-selected="true" data-i18n="resources">Resources</button>
        <button class="market-tab" type="button" data-category="General" role="tab" aria-selected="false" data-i18n="general">General</button>
      </div>
      <input class="field" id="global-search" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" placeholder="搜尋玩家 / 物品 / 交易紀錄" />
      <select class="field" id="item-sort">
        <option value="default" data-i18n="defaultOrder">預設排序</option>
        <option value="price-desc" data-i18n="priceHighToLow">價格由高到低</option>
        <option value="price-asc" data-i18n="priceLowToHigh">價格由低到高</option>
        <option value="name" data-i18n="nameAZ">名稱 A-Z</option>
      </select>
      <button class="refresh" id="refresh" type="button" data-i18n="refresh">更新</button>
    </section>

    <div class="status" aria-live="polite">
      <span class="dot loading" id="status-dot"></span>
      <span id="status-text" data-i18n="preparing">準備中…</span>
    </div>

    <div id="error-area"></div>

    <section class="section" id="dashboard-section">
      <div class="section-head">
        <h2 class="section-title" data-i18n="marketOverview">市場總覽</h2>
        <div class="section-note" id="dashboard-note"></div>
      </div>
      <div class="metric-grid" id="market-metrics"></div>
      <div class="dashboard-grid">
        <article class="card panel">
          <div class="section-head"><h3 class="section-title" data-i18n="top10IncomePlayers">Top 10 收入玩家</h3></div>
          <div class="compact-list" id="top-income-list"></div>
        </article>
        <article class="card panel">
          <div class="section-head"><h3 class="section-title" data-i18n="top5ConcentratedItems">Top 5 集中商品</h3></div>
          <div class="compact-list" id="top-concentration-list"></div>
        </article>
        <article class="card panel">
          <div class="section-head"><h3 class="section-title" data-i18n="highPatternScorePlayers">高市場模式分數玩家</h3></div>
          <div class="compact-list" id="high-score-list"></div>
        </article>
        <article class="card panel wide">
          <div class="section-head"><h3 class="section-title" data-i18n="recent20Transactions">最近 20 筆交易</h3></div>
          <div id="recent-transactions"></div>
        </article>
      </div>
    </section>

    <section class="section" id="search-section">
      <div class="section-head">
        <h2 class="section-title" data-i18n="searchResults">搜尋結果</h2>
        <div class="section-note" id="search-summary"></div>
      </div>
      <div class="search-layout">
        <article class="card panel">
          <h3 class="section-title" data-i18n="relatedPlayers">相關玩家</h3>
          <div class="compact-list" id="search-players"></div>
        </article>
        <article class="card panel">
          <h3 class="section-title" data-i18n="relatedItems">相關物品</h3>
          <div class="compact-list" id="search-items"></div>
        </article>
        <article class="card panel">
          <h3 class="section-title" data-i18n="relatedTransactions">相關交易紀錄</h3>
          <div class="compact-list" id="search-transactions"></div>
        </article>
      </div>
    </section>

    <section class="section" id="player-section">
      <div class="section-head">
        <h2 class="section-title" data-i18n="playerProfile">玩家分析</h2>
        <div class="section-note" id="player-note"></div>
      </div>
      <div class="card profile" id="player-profile"></div>
      <div class="tabs" id="analysis-tabs" role="tablist">
        <button class="tab-btn active" type="button" data-tab="overview" data-i18n="overview">總覽</button>
        <button class="tab-btn" type="button" data-tab="transactions" data-i18n="transactions">交易紀錄</button>
        <button class="tab-btn" type="button" data-tab="related" data-i18n="relatedAccounts">關聯帳戶</button>
        <button class="tab-btn" type="button" data-tab="daily" data-i18n="dailyIncome">每日收入</button>
        <button class="tab-btn" type="button" data-tab="alerts" data-i18n="patternAlerts">市場模式通知</button>
        <button class="tab-btn" type="button" data-tab="concentration" data-i18n="itemConcentration">商品集中度</button>
      </div>
      <div class="tab-panel active" id="tab-overview"></div>
      <div class="tab-panel" id="tab-transactions"></div>
      <div class="tab-panel" id="tab-related"></div>
      <div class="tab-panel" id="tab-daily"></div>
      <div class="tab-panel" id="tab-alerts"></div>
      <div class="tab-panel" id="tab-concentration"></div>
    </section>

    <section class="section" id="items-section">
      <div class="section-head">
        <h2 class="section-title" data-i18n="itemMarketConcentration">商品市場集中度</h2>
        <div class="section-note" id="item-note"></div>
      </div>
      <div class="item-grid" id="item-grid"></div>
    </section>
  </main>

  <script>
    const API_BASE = "https://elf-market-api.vercel.app";
    const IMG_BASE = "https://jinzaroo.github.io/Elf-calculator/images/";
    const REFRESH_MS = 5 * 60 * 1000;
    const REQUEST_DELAY_MS = 120;

    const FALLBACK_I18N = {
      "zh-TW": {

    function t(key) { return state.i18n[key] || FALLBACK_I18N.en[key] || key; }

    function escapeHtml(value) { return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function formatPrice(value) { if (!Number.isFinite(value) || value <= 0) return "-"; return value >= 1 ? value.toFixed(4) : value.toFixed(6); }
    function formatInteger(value) { if (!Number.isFinite(value)) return "-"; return new Intl.NumberFormat("en-US").format(value); }

        if (res.ok) state.i18n = { ...FALLBACK_I18N[selected], ...(await res.json()) };
        else state.i18n = FALLBACK_I18N[selected];
      } catch {

      state.lang = selected;

    function applyI18n() {

      document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => { node.placeholder = t(node.dataset.i18nPlaceholder); });

    function getCategoryItems() { return ITEMS.filter((item) => item.category === state.activeCategory); }
    function getCategoryTransactions() { return getCategoryItems().flatMap((item) => state.prices.get(item.id)?.transactions || []).sort((a, b) => Number(b.txnTime || 0) - Number(a.txnTime || 0)); }
    function getAllPlayerNames(transactions) {
      const names = new Map();
      transactions.forEach((tx) => [tx.sellerName, tx.buyerName, tx.orderUserName, tx.traderName].forEach((name) => {
        if (isKnownPlayer(name) && !names.has(playerKey(name))) names.set(playerKey(name), name);
      }));
      return names;
    }
    function resolvePlayerName(query, transactions) {
      const value = query.trim();
      if (!value) return null;
      const names = getAllPlayerNames(transactions);
      if (names.has(playerKey(value))) return names.get(playerKey(value));
      return [...names.entries()].find(([key]) => key.includes(playerKey(value)))?.[1] || null;
    }
    function getPlayerTransactions(playerName, transactions) {
      const key = playerKey(playerName);
      if (!key) return [];
      return transactions.filter((tx) => playerKey(tx.sellerName) === key || playerKey(tx.buyerName) === key);
    }

    function sellerStats(transactions) {
      const stats = new Map();
      transactions.forEach((tx) => {
        if (!isKnownPlayer(tx.sellerName)) return;
        const key = playerKey(tx.sellerName);
        const row = stats.get(key) || { name: tx.sellerName, income: 0, count: 0, buyers: new Set(), lastSeen: 0, lowCount: 0 };
        row.income += Number(tx.totalAmountSigil) || 0;
        row.count += 1;
        row.lastSeen = Math.max(row.lastSeen, Number(tx.txnTime) || 0);
        if (Number(tx.price) > 0 && Number(tx.price) <= 0.011) row.lowCount += 1;
        if (isKnownPlayer(tx.buyerName)) row.buyers.add(playerKey(tx.buyerName));
        stats.set(key, row);
      });
      return [...stats.values()];
    }

    function itemStats(transactions) {
      const items = new Map();
      transactions.forEach((tx) => {
        const key = String(tx.itemId);
        const item = items.get(key) || { itemId: tx.itemId, itemName: tx.itemName, count: 0, total: 0, sellers: new Map() };
        const amount = Number(tx.totalAmountSigil) || 0;
        item.count += 1;
        item.total += amount;
        if (isKnownPlayer(tx.sellerName)) {
          const sellerKey = playerKey(tx.sellerName);
          const seller = item.sellers.get(sellerKey) || { name: tx.sellerName, total: 0, count: 0 };
          seller.total += amount;
          seller.count += 1;
          item.sellers.set(sellerKey, seller);
        }
        items.set(key, item);
      });
      return [...items.values()].map((item) => {
        const topSellers = [...item.sellers.values()].sort((a, b) => b.total - a.total).slice(0, 5);
        const topTotal = topSellers.reduce((sum, seller) => sum + seller.total, 0);
        return { ...item, topSellers, topShare: item.total > 0 ? topTotal / item.total : 0 };
      });
    }

    function buildNetwork(playerName, transactions) {
      const rows = new Map();
      const key = playerKey(playerName);
      getPlayerTransactions(playerName, transactions).forEach((tx) => {
        const isSeller = playerKey(tx.sellerName) === key;
        const counterpartyName = isSeller ? tx.buyerName : tx.sellerName;
        if (!isKnownPlayer(counterpartyName) || playerKey(counterpartyName) === key) return;
        const rowKey = playerKey(counterpartyName);
        const row = rows.get(rowKey) || { name: counterpartyName, count: 0, total: 0, items: new Map(), lastSeen: 0, lowCount: 0 };
        row.count += 1;
        row.total += Number(tx.totalAmountSigil) || 0;
        row.lastSeen = Math.max(row.lastSeen, Number(tx.txnTime) || 0);
        if (Number(tx.price) > 0 && Number(tx.price) <= 0.011) row.lowCount += 1;
        row.items.set(tx.itemName, (row.items.get(tx.itemName) || 0) + 1);
        rows.set(rowKey, row);
      });
      return [...rows.values()];
    }

    function maxGroupedCount(transactions, getKey) {
      const counts = new Map();
      transactions.forEach((tx) => {
        const key = getKey(tx);
        if (key) counts.set(key, (counts.get(key) || 0) + 1);
      });
      return Math.max(0, ...counts.values());
    }

    function getScoreLevel(score) {
      if (score <= 30) return t("normalPattern");
      if (score <= 60) return t("watchlist");
      if (score <= 80) return t("highConcentration");
      return t("abnormalPattern");
    }

    function computePatternScore(transactions, playerName) {
      const subject = playerName ? getPlayerTransactions(playerName, transactions) : transactions;
      const txCount = subject.length;
      if (!txCount) return { score: 0, txCount: 0, relatedCount: 0, lowRatio: 0, repeatRatio: 0, maxHourDensity: 0, sameCounterpart: 0 };
      const relatedCount = playerName ? buildNetwork(playerName, transactions).length : getAllPlayerNames(subject).size;
      const lowRatio = subject.filter((tx) => Number(tx.price) > 0 && Number(tx.price) <= 0.011).length / txCount;
      const repeatRatio = maxGroupedCount(subject, (tx) => `${tx.itemId}:${tx.itemNum}`) / txCount;
      const maxHourDensity = maxGroupedCount(subject, (tx) => Number(tx.txnTime) > 0 ? String(Math.floor(Number(tx.txnTime) / 3600)) : "");
      const sameCounterpart = playerName ? Math.max(0, ...buildNetwork(playerName, transactions).map((row) => row.count)) : maxGroupedCount(subject, (tx) => [playerKey(tx.sellerName), playerKey(tx.buyerName)].sort().join("::"));
      const score = Math.round(Math.min(100, Math.min(24, txCount * 0.65) + Math.min(20, relatedCount * (playerName ? 2.4 : 0.35)) + Math.min(20, lowRatio * 40) + Math.min(18, repeatRatio * 28) + Math.min(10, maxHourDensity * 1.2) + Math.min(8, sameCounterpart * 0.8)));
      return { score, txCount, relatedCount, lowRatio, repeatRatio, maxHourDensity, sameCounterpart };
    }

        ${tag ? `<div class="stat"><span></span><strong><span class="tag">${escapeHtml(tag)}</span></strong></div>` : ""}
      </article>`;
    }

    function renderTransactionTable(transactions, limit = 20) {
      const rows = transactions.slice(0, limit);
      if (!rows.length) return `<div class="empty">${t("waitingForTransactions")}</div>`;
      const desktop = `<div class="table-shell desktop-transactions"><table><thead><tr><th>${t("item")}</th><th>${t("seller")}</th><th>${t("buyer")}</th><th>${t("price")}</th><th>${t("quantity")}</th><th>${t("time")}</th></tr></thead><tbody>${rows.map((tx) => `<tr><td>${escapeHtml(tx.itemName)}</td><td>${escapeHtml(tx.sellerName)}</td><td>${escapeHtml(tx.buyerName)}</td><td>${formatPrice(tx.price)}</td><td>${formatInteger(tx.itemNum)}</td><td>${formatTime(tx.txnTime)}</td></tr>`).join("")}</tbody></table></div>`;
      const mobile = `<div class="mobile-transactions">${rows.map((tx) => `<article class="tx-card"><strong>${escapeHtml(tx.itemName)}</strong><div class="tx-line">${escapeHtml(tx.sellerName)} → ${escapeHtml(tx.buyerName)}</div><div class="tx-line">${t("price")} ${formatPrice(tx.price)} / ${t("quantity")} ${formatInteger(tx.itemNum)} / ${formatTime(tx.txnTime)}</div></article>`).join("")}</div>`;
      return desktop + mobile;
    }

    function renderDashboard(transactions) {
      const sellers = new Set(transactions.map((tx) => playerKey(tx.sellerName)).filter(Boolean));
      const buyers = new Set(transactions.map((tx) => playerKey(tx.buyerName)).filter(Boolean));
      const totalVolume = transactions.reduce((sum, tx) => sum + (Number(tx.totalAmountSigil) || 0), 0);
      el.dashboardNote.textContent = `${t("currentMarket")}: ${state.activeCategory}`;
      el.marketMetrics.innerHTML = [
        metricCard(t("totalTransactions"), formatInteger(transactions.length)),
        metricCard(t("totalVolume"), formatPrice(totalVolume)),
        metricCard(t("activeSellers"), formatInteger(sellers.size)),
        metricCard(t("activeBuyers"), formatInteger(buyers.size))
      ].join("");

      const sellersSorted = sellerStats(transactions).sort((a, b) => b.income - a.income).slice(0, 10);
      el.topIncome.innerHTML = sellersSorted.length ? sellersSorted.map((row, index) => compactRow(`#${index + 1} ${escapeHtml(row.name)}`, `${t("relatedBuyers")}: ${row.buyers.size}`, [{ label: t("totalIncome"), value: formatPrice(row.income) }, { label: t("tradeCount"), value: formatInteger(row.count) }, { label: t("averageIncome"), value: formatPrice(row.income / row.count) }])).join("") : `<div class="empty">${t("waitingForTransactions")}</div>`;

      const concentrated = itemStats(transactions).sort((a, b) => b.topShare - a.topShare || b.total - a.total).slice(0, 5);
      el.topConcentration.innerHTML = concentrated.length ? concentrated.map((row) => compactRow(escapeHtml(row.itemName), `${t("topSeller")}: ${escapeHtml(row.topSellers[0]?.name || "-")}`, [{ label: t("totalVolume"), value: formatPrice(row.total) }, { label: t("totalTradesShort"), value: formatInteger(row.count) }, { label: t("top5Share"), value: `${(row.topShare * 100).toFixed(1)}%` }], row.topShare >= 0.8 ? t("highConcentration") : "")).join("") : `<div class="empty">${t("waitingForTransactions")}</div>`;

      const highScores = sellerStats(transactions).map((row) => ({ ...row, pattern: computePatternScore(transactions, row.name) })).filter((row) => row.pattern.score >= 61).sort((a, b) => b.pattern.score - a.pattern.score).slice(0, 10);
      el.highScore.innerHTML = highScores.length ? highScores.map((row) => compactRow(escapeHtml(row.name), getScoreLevel(row.pattern.score), [{ label: t("patternScore"), value: String(row.pattern.score) }, { label: t("tradeCount"), value: formatInteger(row.pattern.txCount) }, { label: t("relatedAccountCount"), value: formatInteger(row.pattern.relatedCount) }])).join("") : `<div class="empty">${t("noDataFound")}</div>`;
      el.recentTransactions.innerHTML = renderTransactionTable(transactions, 20);
    }

    function renderSearch(transactions) {
      const query = el.search.value.trim().toLowerCase();
      if (!query) {
        el.searchSummary.textContent = t("enterSearch");
        el.searchPlayers.innerHTML = `<div class="empty">${t("enterSearch")}</div>`;
        el.searchItems.innerHTML = `<div class="empty">${t("enterSearch")}</div>`;
        el.searchTransactions.innerHTML = `<div class="empty">${t("enterSearch")}</div>`;
        return;
      }
      const players = [...getAllPlayerNames(transactions).values()].filter((name) => name.toLowerCase().includes(query)).slice(0, 12);
      const items = getCategoryItems().filter((item) => item.name.toLowerCase().includes(query) || item.group.toLowerCase().includes(query) || String(item.id).includes(query)).slice(0, 12);
      const txs = transactions.filter((tx) => tx.sellerName.toLowerCase().includes(query) || tx.buyerName.toLowerCase().includes(query) || tx.itemName.toLowerCase().includes(query) || String(tx.itemId).includes(query) || String(tx.txnId).includes(query)).slice(0, 20);
      el.searchSummary.textContent = `${t("resultCount")}: ${players.length + items.length + txs.length}`;
      el.searchPlayers.innerHTML = players.length ? players.map((name) => compactRow(escapeHtml(name), "", [{ label: t("tradeCount"), value: formatInteger(getPlayerTransactions(name, transactions).length) }, { label: t("totalIncome"), value: formatPrice(sellerStats(transactions).find((row) => playerKey(row.name) === playerKey(name))?.income || 0) }, { label: t("patternScore"), value: String(computePatternScore(transactions, name).score) }])).join("") : `<div class="empty">${t("noDataFound")}</div>`;
      el.searchItems.innerHTML = items.length ? items.map((item) => compactRow(escapeHtml(item.name), `${item.category} / ${item.group} - ID ${item.id}`, [{ label: t("price"), value: formatPrice(state.prices.get(item.id)?.price) }, { label: t("tradeCount"), value: formatInteger(state.prices.get(item.id)?.transactions?.length || 0) }, { label: t("lastSeen"), value: formatTime(state.prices.get(item.id)?.tx?.txnTime) }])).join("") : `<div class="empty">${t("noDataFound")}</div>`;
      el.searchTransactions.innerHTML = txs.length ? txs.slice(0, 8).map((tx) => compactRow(escapeHtml(tx.itemName), `${escapeHtml(tx.sellerName)} → ${escapeHtml(tx.buyerName)}`, [{ label: t("price"), value: formatPrice(tx.price) }, { label: t("quantity"), value: formatInteger(tx.itemNum) }, { label: t("time"), value: formatTime(tx.txnTime) }])).join("") : `<div class="empty">${t("noDataFound")}</div>`;
    }

    function renderPlayer(transactions) {
      const playerName = resolvePlayerName(el.search.value.trim(), transactions);
      if (!playerName) {
        el.playerNote.textContent = t("enterPlayerForProfile");
        el.playerProfile.innerHTML = `<div class="notice">${t("enterPlayerForProfile")}</div>`;
        document.querySelectorAll(".tab-panel").forEach((panel) => { panel.innerHTML = ""; });
        return;
      }
      const playerTx = getPlayerTransactions(playerName, transactions);
      const soldTx = playerTx.filter((tx) => playerKey(tx.sellerName) === playerKey(playerName));
      const income = soldTx.reduce((sum, tx) => sum + (Number(tx.totalAmountSigil) || 0), 0);
      const network = buildNetwork(playerName, transactions);
      const lowCount = playerTx.filter((tx) => Number(tx.price) > 0 && Number(tx.price) <= 0.011).length;
      const lastSeen = Math.max(0, ...playerTx.map((tx) => Number(tx.txnTime) || 0));
      const pattern = computePatternScore(transactions, playerName);
      el.playerNote.textContent = playerName;
      el.playerProfile.innerHTML = `
        <div><span class="metric-label">${t("playerName")}</span><div class="profile-name">${escapeHtml(playerName)}</div></div>
        <div class="profile-stat"><span>${t("totalIncome")}</span><strong>${formatPrice(income)}</strong></div>
        <div class="profile-stat"><span>${t("tradeCount")}</span><strong>${formatInteger(playerTx.length)}</strong></div>
        <div class="profile-stat"><span>${t("relatedAccounts")}</span><strong>${formatInteger(network.length)}</strong></div>
        <div class="profile-stat"><span>${t("patternScore")}</span><strong>${pattern.score}</strong></div>
        <div class="profile-stat"><span>${t("averageIncome")}</span><strong>${formatPrice(soldTx.length ? income / soldTx.length : 0)}</strong></div>
        <div class="profile-stat"><span>${t("lowPriceTransferCount")}</span><strong>${formatInteger(lowCount)}</strong></div>
        <div class="profile-stat"><span>${t("lastSeen")}</span><strong>${formatTime(lastSeen)}</strong></div>
      `;
      renderPlayerTabs(playerName, transactions, playerTx, network, pattern);
    }

    function renderPlayerTabs(playerName, transactions, playerTx, network, pattern) {
      const reasons = [
        [t("relatedAccountsCount"), formatInteger(pattern.relatedCount)],
        [t("lowPriceTransferRatio"), `${(pattern.lowRatio * 100).toFixed(1)}%`],
        [t("repeatedItemQuantityRatio"), `${(pattern.repeatRatio * 100).toFixed(1)}%`],
        [t("hourlyTradeDensity"), formatInteger(pattern.maxHourDensity)],
        [t("sameCounterpartFrequency"), formatInteger(pattern.sameCounterpart)]
      ];
      document.getElementById("tab-overview").innerHTML = `<article class="card panel"><h3 class="section-title">${t("marketplacePatternScore")}</h3><div class="score-wrap"><div class="metric-value">${pattern.score} <span class="tag">${getScoreLevel(pattern.score)}</span></div><div class="score-line"><div class="score-fill" style="width:${pattern.score}%"></div></div><div class="compact-list">${reasons.map(([label, value]) => compactRow(escapeHtml(label), "", [{ label: t("currentMarket"), value: state.activeCategory }, { label: t("patternScore"), value }, { label: t("playerName"), value: playerName }])).join("")}</div></div></article>`;
      document.getElementById("tab-transactions").innerHTML = renderTransactionTable(playerTx, 80);

      const sort = document.getElementById("related-sort")?.value || "total";
      const sortedNetwork = [...network].sort((a, b) => sort === "count" ? b.count - a.count : sort === "last" ? b.lastSeen - a.lastSeen : b.total - a.total);
      document.getElementById("tab-related").innerHTML = `<div class="section-head"><select class="field" id="related-sort"><option value="total" ${sort === "total" ? "selected" : ""}>${t("sortByTotalAmount")}</option><option value="count" ${sort === "count" ? "selected" : ""}>${t("sortByTradeCount")}</option><option value="last" ${sort === "last" ? "selected" : ""}>${t("sortByLastSeen")}</option></select></div><div class="compact-list">${sortedNetwork.length ? sortedNetwork.slice(0, 50).map((row) => {
        const mainItems = [...row.items.entries()].sort((a, b) => b[1] - a[1]).slice(0, 3).map(([name]) => name).join(", ");
        return compactRow(escapeHtml(row.name), `${t("mainItems")}: ${escapeHtml(mainItems || "-")}`, [{ label: t("totalAmount"), value: formatPrice(row.total) }, { label: t("tradeCount"), value: formatInteger(row.count) }, { label: t("lastSeen"), value: formatTime(row.lastSeen) }], row.lowCount ? t("hasLowPrice") : t("noLowPrice"));
      }).join("") : `<div class="empty">${t("noDataFound")}</div>`}</div>`;
      document.getElementById("related-sort")?.addEventListener("change", () => renderPlayerTabs(playerName, transactions, playerTx, network, pattern));

      const daily = new Map();
      playerTx.filter((tx) => playerKey(tx.sellerName) === playerKey(playerName)).forEach((tx) => {
        const date = new Date(Number(tx.txnTime) * 1000).toLocaleDateString("en-CA");
        const row = daily.get(date) || { date, income: 0, count: 0 };
        row.income += Number(tx.totalAmountSigil) || 0;
        row.count += 1;
        daily.set(date, row);
      });
      let cumulative = 0;
      document.getElementById("tab-daily").innerHTML = `<div class="compact-list">${[...daily.values()].sort((a, b) => a.date.localeCompare(b.date)).map((row) => { cumulative += row.income; return compactRow(escapeHtml(row.date), "", [{ label: t("income"), value: formatPrice(row.income) }, { label: t("tradeCount"), value: formatInteger(row.count) }, { label: t("cumulativeIncome"), value: formatPrice(cumulative) }]); }).join("") || `<div class="empty">${t("noDataFound")}</div>`}</div>`;

      const notices = buildPatternNotices(playerName, transactions, playerTx, network, pattern);
      document.getElementById("tab-alerts").innerHTML = `<div class="compact-list">${notices.length ? notices.map((notice) => `<div class="notice">${escapeHtml(notice)}</div>`).join("") : `<div class="empty">${t("noNotices")}</div>`}</div>`;
      document.getElementById("tab-concentration").innerHTML = `<div class="compact-list">${renderItemConcentrationRows(itemStats(transactions).slice(0, 20))}</div>`;
    }

    function buildPatternNotices(playerName, transactions, playerTx, network, pattern) {
      const notices = [];
      if (pattern.sameCounterpart >= 10) notices.push(`${t("sameCounterpartFrequency")}: ${pattern.sameCounterpart}`);
      if (pattern.lowRatio >= 0.25) notices.push(`${t("lowPriceTransferRatio")}: ${(pattern.lowRatio * 100).toFixed(1)}%`);
      if (pattern.repeatRatio >= 0.25) notices.push(`${t("repeatedItemQuantityRatio")}: ${(pattern.repeatRatio * 100).toFixed(1)}%`);
      if (pattern.relatedCount >= 20) notices.push(`${t("relatedAccountsCount")}: ${pattern.relatedCount}`);
      if (pattern.maxHourDensity >= 12) notices.push(`${t("hourlyTradeDensity")}: ${pattern.maxHourDensity}`);
      return notices;
    }

    function renderItemConcentrationRows(rows) {
      return rows.sort((a, b) => b.topShare - a.topShare || b.total - a.total).map((row) => compactRow(escapeHtml(row.itemName), `${t("topSeller")}: ${escapeHtml(row.topSellers[0]?.name || "-")}`, [{ label: t("totalVolume"), value: formatPrice(row.total) }, { label: t("totalTrades"), value: formatInteger(row.count) }, { label: t("top5Share"), value: `${(row.topShare * 100).toFixed(1)}%` }], row.topShare >= 0.8 ? t("highConcentration") : "")).join("") || `<div class="empty">${t("waitingForTransactions")}</div>`;
    }

    function renderItems(transactions) {
      const query = el.search.value.trim().toLowerCase();
      const categoryItems = getCategoryItems().filter((item) => {
        if (!query) return true;
        return item.name.toLowerCase().includes(query) || item.group.toLowerCase().includes(query) || String(item.id).includes(query);
      });
      const sort = el.sort.value;
      const sorted = [...categoryItems].sort((a, b) => {
        const pa = state.prices.get(a.id)?.price;
        const pb = state.prices.get(b.id)?.price;
        if (sort === "name") return a.name.localeCompare(b.name);
        if (sort === "price-asc") return (pa ?? Number.POSITIVE_INFINITY) - (pb ?? Number.POSITIVE_INFINITY);
        if (sort === "price-desc") return (pb ?? Number.NEGATIVE_INFINITY) - (pa ?? Number.NEGATIVE_INFINITY);
        return a.order - b.order;
      });
      el.itemNote.textContent = `${state.activeCategory} / ${sorted.length}`;
      el.itemGrid.innerHTML = sorted.map((item) => {
        const row = state.prices.get(item.id);
        const tx = row?.tx;
        const media = item.category === "Resources" ? `<img class="item-img" src="${IMG_BASE}${item.id}.png" alt="${escapeHtml(item.name)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(item.name.slice(0, 1).toUpperCase())}'))" />` : escapeHtml(item.name.slice(0, 1).toUpperCase());
        return `<article class="card item-card"><div class="item-head"><div class="item-media">${media}</div><div><div class="item-name">${escapeHtml(item.name)}</div><div class="item-meta">${escapeHtml(item.group)} - ID ${item.id}</div></div></div><div class="item-stats"><div class="stat"><span>${t("price")}</span><strong>${formatPrice(row?.price)}</strong></div><div class="stat"><span>${t("tradeCount")}</span><strong>${formatInteger(row?.transactions?.length || 0)}</strong></div><div class="stat"><span>${t("seller")}</span><strong>${escapeHtml(tx?.sellerName || "-")}</strong></div><div class="stat"><span>${t("buyer")}</span><strong>${escapeHtml(tx?.buyerName || "-")}</strong></div></div></article>`;
      }).join("") || `<div class="empty">${t("noDataFound")}</div>`;
    }

    function render() {
      const transactions = getCategoryTransactions();
      renderDashboard(transactions);
      renderSearch(transactions);
      renderPlayer(transactions);
      renderItems(transactions);
    }

    async function getAccessToken() {
      const res = await fetch(`${API_BASE}/api/refresh`, { method: "POST" });
      const data = await res.json();
      if (!res.ok || data.code !== 0) throw new Error(data.message || `Token refresh failed (${res.status})`);
      return `Bearer ${data.data.accessToken}`;
    }

    function normalizeTransaction(tx, item) {
      const itemNum = Number(tx.itemNum);
      const totalAmountSigil = Number(tx.totalAmount) / 1e9;
      const price = totalAmountSigil / itemNum;
      const orderType = Number(tx.orderType);
      const orderUser = { id: tx.orderUserId, name: tx.orderUserName || "-" };
      const trader = { id: tx.traderId, name: tx.traderName || "-" };
      const seller = orderType === 1 ? orderUser : orderType === 2 ? trader : null;
      const buyer = orderType === 1 ? trader : orderType === 2 ? orderUser : null;
      return { itemId: item.id, itemName: item.name, itemGroup: item.group, category: item.category, itemNum, price, orderType, totalAmountSigil, txnId: tx.txnId, txnTime: tx.txnTime, orderUserId: orderUser.id, orderUserName: orderUser.name, traderId: trader.id, traderName: trader.name, sellerId: seller?.id, sellerName: seller?.name || "-", buyerId: buyer?.id, buyerName: buyer?.name || "-" };
    }

    async function fetchItemPrice(item, accessToken) {
      const url = `${API_BASE}/api/price?itemId=${item.id}&accessToken=${encodeURIComponent(accessToken)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok || data.code !== 0) throw new Error(data.message || `Price request failed (${res.status})`);
      if (!data.data?.length) return { price: null, tx: null, transactions: [], updatedAt: Date.now() };
      const transactions = data.data.map((tx) => normalizeTransaction(tx, item));
      return { price: transactions[0].price, tx: transactions[0], transactions, updatedAt: Date.now() };
    }

    function scheduleNextRefresh() {
      clearTimeout(state.refreshTimer);
      state.nextRefreshAt = Date.now() + REFRESH_MS;
      state.refreshTimer = setTimeout(() => refreshPrices(), REFRESH_MS);
    }

    async function refreshPrices() {
      if (state.loading) return;
      const runId = ++state.refreshRunId;
      const items = getCategoryItems();
      state.loading = true;
      el.refresh.disabled = true;
      el.error.innerHTML = "";
      setStatus("loading", t("refreshingToken"));
      try {
        const accessToken = await getAccessToken();
        for (let index = 0; index < items.length; index += 1) {
          if (runId !== state.refreshRunId) return;
          const item = items[index];
          setStatus("loading", `${t("loadingItem")} ${item.name} (${index + 1}/${items.length})`);
          try {
            state.prices.set(item.id, await fetchItemPrice(item, accessToken));
          } catch (error) {
            state.prices.set(item.id, { price: null, tx: null, transactions: [], updatedAt: Date.now(), error: error.message });
          }
          render();
          await sleep(REQUEST_DELAY_MS);
        }
        setStatus("ok", `${t("updated")} ${new Date().toLocaleTimeString()}`);
      } catch (error) {
        setStatus("error", t("updateFailed"));
        el.error.innerHTML = `<div class="error-box">${escapeHtml(error.message)}</div>`;
      } finally {
        if (runId === state.refreshRunId) {
          state.loading = false;
          el.refresh.disabled = false;
          scheduleNextRefresh();
        }
      }
    }

    function switchCategory(category) {
      if (state.activeCategory === category) return;
      state.activeCategory = category;
      state.refreshRunId += 1;
      state.loading = false;
      el.refresh.disabled = false;
      clearTimeout(state.refreshTimer);
      el.marketTabs.forEach((tab) => {
        const active = tab.dataset.category === category;
        tab.classList.toggle("active", active);
        tab.setAttribute("aria-selected", String(active));
      });
      render();
      refreshPrices();
    }

    el.marketTabs.forEach((tab) => tab.addEventListener("click", () => switchCategory(tab.dataset.category)));
    el.tabButtons.forEach((button) => button.addEventListener("click", () => {
      state.activeTab = button.dataset.tab;
      el.tabButtons.forEach((tab) => tab.classList.toggle("active", tab === button));
      document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.toggle("active", panel.id === `tab-${state.activeTab}`));
    }));
    el.langButtons.forEach((button) => button.addEventListener("click", () => loadLanguage(button.dataset.lang)));
    el.search.addEventListener("input", render);
    el.sort.addEventListener("change", render);
    el.refresh.addEventListener("click", refreshPrices);

    loadLanguage(state.lang).then(() => refreshPrices());
  </script>
</body>
</html>
